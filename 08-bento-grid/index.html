<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Grid</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="grid">

    <div class="block block1">
      <h3>HTML</h3>
      <p>The structure of every website.</p>
    </div>

    <div class="block pink block2">
      <h3>CSS</h3>
      <p>Making things look pretty.</p>
    </div>

    <div class="block yellow block3">
      <h3>JavaScript</h3>
      <p>Adding dynamic events to your site.</p>
    </div>

    <div class="block blue block4">
      <h3>VS Code</h3>
      <p>Because typing code into Notepad is unhinged.</p>
    </div>

    <div class="block green block5">
      <h3>Coder Coder Dark</h3>
      <p>The VS Code theme that's in every video.</p>
    </div>

  </div>

</body>

</html>
